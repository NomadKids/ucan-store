name: Akash Service Image

on:
  push:
    branches: [akash]
    paths:
      - 'akash/**'
      - 'local-storacha-api/**'
      - 'web/**'
      - '.github/workflows/akash-service.yml'
  pull_request:
    branches: [main, akash]
    paths:
      - 'akash/**'
      - 'local-storacha-api/**'
      - 'web/**'
      - '.github/workflows/akash-service.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-service-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Akash service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: akash/service/Dockerfile
          push: false
          load: true
          tags: ucan-store-akash:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test Akash service image
        env:
          UCAN_STORE_AKASH_IMAGE: ucan-store-akash:ci
          UCAN_STORE_SMOKE_MODE: host
        run: bash akash/service/scripts/docker-smoke.sh

      - name: Smoke test persistent service identity
        env:
          UCAN_STORE_AKASH_IMAGE: ucan-store-akash:ci
        run: bash akash/service/scripts/docker-identity-smoke.sh
